<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Episode - TOONZI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- RESET & BASICS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #e0e0e0; transition: background-color 0.3s, color 0.3s; }
        a { text-decoration: none; color: inherit; }

        /* --- HEADER --- */
        header { background: #1a1a1a; color: #fff; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 999; border-bottom: 1px solid #333; }
        .menu-icon { font-size: 24px; cursor: pointer; transition: 0.3s; width: 30px; }
        .menu-icon:hover { color: #ffcc00; }
        .site-title { font-family: 'Impact', sans-serif; font-size: 26px; letter-spacing: 2px; color: #fff; position: absolute; left: 50%; transform: translateX(-50%); }
        .site-title span { color: #ffcc00; }
        .search-icon { font-size: 20px; cursor: pointer; transition: 0.3s; width: 30px; text-align: right; }
        .search-icon:hover { color: #ffcc00; }

        /* --- SEARCH BAR --- */
        .search-box-container { position: sticky; top: 70px; width: 100%; background: #1e1e1e; padding: 10px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); z-index: 998; display: none; align-items: center; gap: 10px; border-bottom: 1px solid #444; }
        .search-box-container.active { display: flex; }
        .search-box-container input { flex: 1; padding: 12px 15px; font-size: 16px; border: 1px solid #444; border-radius: 6px; outline: none; background: #2a2a2a; color: #fff; }
        .search-box-container input:focus { border-color: #ffcc00; }
        .search-box-container .close-search-btn { font-size: 24px; color: #aaa; cursor: pointer; padding: 5px 10px; transition: 0.3s; }
        .search-box-container .close-search-btn:hover { color: #ff5555; }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #1a1a2e; color: #fff; transition: 0.4s ease-in-out; padding-top: 60px; z-index: 2000; box-shadow: 2px 0 10px rgba(0,0,0,0.5); overflow-y: auto; }
        .sidebar.active { left: 0; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 16px; color: #ccc; display: block; transition: 0.3s; border-left: 4px solid transparent; }
        .sidebar a:hover { color: #fff; background-color: #252547; border-left: 4px solid #ffcc00; }
        .sidebar .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #ffcc00; }

        /* --- DOWNLOAD CONTENT STYLES --- */
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        .download-card {
            background: #1e1e1e; border: 1px solid #333; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.7);
        }

        /* Card Header */
        .card-header { background: #2a2a2a; padding: 15px 20px; border-bottom: 1px solid #444; display: flex; align-items: center; gap: 15px; }
        .card-header i { color: #ffcc00; font-size: 20px; }
        .card-header h2 { font-size: 18px; font-weight: 600; color: #fff; }

        /* Episode Info */
        .episode-info { padding: 20px; border-bottom: 1px solid #333; display: flex; gap: 20px; flex-wrap: wrap; }
        .episode-poster { width: 180px; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #444; flex-shrink: 0; }
        .episode-text h3 { color: #ffcc00; font-size: 16px; margin-bottom: 8px; }
        .episode-text h4 { color: #fff; font-size: 20px; margin-bottom: 12px; }
        .episode-text p { color: #aaa; font-size: 14px; line-height: 1.6; }

        /* Download Grid */
        .download-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1px; background: #333; }
        .download-item { background: #1e1e1e; padding: 20px; text-align: center; transition: 0.3s; cursor: pointer; border: 1px solid transparent; }
        .download-item:hover { background: #2a2a2a; border-color: #ffcc00; z-index: 10; }
        .download-item i { font-size: 36px; color: #aaa; margin-bottom: 10px; display: block; }
        .download-item .size { font-size: 13px; color: #888; margin-bottom: 8px; display: block; }
        .download-item .quality { font-size: 15px; font-weight: 600; color: #fff; }

        /* --- FOOTER --- */
        footer { background: #1a1a1a; color: #ccc; text-align: center; padding: 20px 10px; border-top: 3px solid #ffcc00; margin-top: 40px; font-size: 13px; line-height: 1.6; }
        footer a { color: #ffcc00; font-weight: bold; }
        .footer-social { margin-top: 8px; display: flex; justify-content: center; gap: 20px; }
        .footer-social a { color: #ccc; font-size: 20px; transition: 0.3s; }
        .footer-social a:hover { color: #ffcc00; transform: scale(1.1); }

        /* --- THEME TOGGLE --- */
        .theme-toggle { position: fixed; bottom: 90px; right: 20px; background: #302b63; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; z-index: 1000; transition: 0.3s; }
        .theme-toggle:hover { transform: scale(1.1); background: #ffcc00; color: #333; }

        /* --- LIGHT MODE --- */
        body.light-mode { background-color: #f4f4f4; color: #333; }
        body.light-mode header { background: #fff; border-bottom: 1px solid #ddd; }
        body.light-mode .site-title { color: #000; }
        body.light-mode .search-box-container { background: #fff; border-bottom: 1px solid #ddd; }
        body.light-mode .search-box-container input { background: #f4f4f4; color: #333; border-color: #ccc; }
        body.light-mode .search-box-container input:focus { border-color: #302b63; }
        body.light-mode .download-card { background: #fff; border-color: #ddd; }
        body.light-mode .card-header { background: #f8f9fa; border-bottom: 1px solid #ddd; }
        body.light-mode .card-header h2 { color: #000; }
        body.light-mode .episode-info { border-bottom: 1px solid #ddd; }
        body.light-mode .episode-text h3 { color: #302b63; }
        body.light-mode .episode-text h4 { color: #000; }
        body.light-mode .episode-text p { color: #555; }
        body.light-mode .download-grid { background: #ddd; }
        body.light-mode .download-item { background: #fff; }
        body.light-mode .download-item:hover { background: #f8f9fa; border-color: #302b63; }
        body.light-mode .download-item .size { color: #888; }
        body.light-mode .download-item .quality { color: #000; }
        body.light-mode .download-item i { color: #555; }
        body.light-mode footer { background: #fff; border-top: 3px solid #302b63; }
        body.light-mode .theme-toggle { background: #302b63; color: #fff; }
        body.light-mode .theme-toggle:hover { background: #ffcc00; color: #333; }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <div class="site-title">TOON<span>ZI</span></div>
        <div class="search-icon" onclick="toggleSearchBar()"><i class="fas fa-search"></i></div>
    </header>

    <div id="searchBox" class="search-box-container">
        <input type="text" id="searchInput" placeholder="Type here to search...">
        <span class="close-search-btn" onclick="toggleSearchBar()">&times;</span>
    </div>

    <div id="mySidebar" class="sidebar">
        <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="anime.html"><i class="fas fa-tv"></i> Anime</a>
        <a href="movies.html"><i class="fas fa-film"></i> Movies</a>
        <a href="web-series.html"><i class="fas fa-video"></i> Web Series</a>
        <div style="border-top: 1px solid #333; margin: 10px 20px;"></div>
        <a href="terms-and-condition.html"><i class="fas fa-file-contract"></i> Terms and Condition</a>
        <a href="privacy-policy.html"><i class="fas fa-shield-alt"></i> Privacy Policy</a>
        <a href="contact.html"><i class="fas fa-envelope"></i> Contact Us</a>
        <a href="dmca.html"><i class="fas fa-copyright"></i> DMCA</a>
    </div>

    <main>
        <div class="container" id="downloadContainer">
            <!-- Content will be loaded by JavaScript -->
            <div style="text-align: center; padding: 50px; color: #888;">
                <i class="fas fa-spinner fa-spin" style="font-size: 30px;"></i>
                <p style="margin-top: 10px;">Loading Episode Data...</p>
            </div>
        </div>
    </main>

    <footer>
        <p style="margin-bottom: 5px;">
            <a href="index.html">Home</a> | <a href="anime.html">Anime</a> | <a href="movies.html">Movies</a> | 
            <a href="web-series.html">Web Series</a> | <a href="terms-and-condition.html">Terms</a> | 
            <a href="privacy-policy.html">Privacy</a> | <a href="contact.html">Contact</a> | <a href="dmca.html">DMCA</a>
        </p>
        <p>Copyright © 2012-2025. All Rights Reserved by <a href="https://toonzi.xyz">TOONZI</a>.</p>
        <div class="footer-social">
            <a href="#" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/toonzi.xyz?igsh=MXdieXVwZmFzNm04cQ==" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>

    <div class="theme-toggle" onclick="toggleLightMode()">
        <i class="fas fa-moon"></i>
    </div>

    <script>
        // --- DATA DATABASE (Aap yahan apne saare episodes ka data daal sakte hain) ---
        const episodesData = {
            "1": {
                "animeTitle": "Demon Slayer (Kimetsu no Yaiba)",
                "episodeName": "S01E01 — Cruelty",
                "poster": "https://cdn.phototourl.com/free/2026-06-25-2a28c5f0-f59d-45ba-9b25-8dda69146928.jpg",
                "synopsis": "It is the Taisho Period (i.e. 1912-1926). Tanjiro Kamado is living a modest but blissful life in the mountains with his family. One day, when he returns from selling charcoal in town, he finds the remains of his family slaughtered by demons. He finds his sister Nezuko, who is turning into a demon slowly. Tanjiro sets out to become a demon slayer to avenge his family and cure his sister.",
                "downloads": [
                    { "quality": "480p x264", "size": "111.14 MB", "link": "#" },
                    { "quality": "720p x264", "size": "214.63 MB", "link": "#" },
                    { "quality": "720p HEVC 10bit", "size": "162.67 MB", "link": "#" },
                    { "quality": "1080p HEVC 10bit", "size": "366.06 MB", "link": "#" },
                    { "quality": "1080p HEVC 10bit [HQ]", "size": "1.43 GB", "link": "#" }
                ]
            },
            "2": {
                "animeTitle": "Demon Slayer (Kimetsu no Yaiba)",
                "episodeName": "S01E02 — Trainer Sakonji Urokodaki",
                "poster": "https://cdn.phototourl.com/free/2026-06-25-24ba2203-1a9a-4fe4-bbb1-7b0cb92b42c4.jpg",
                "synopsis": "Tanjiro wakes up to find Nezuko sleeping peacefully. He meets a man named Urokodaki, who tells him that he was the one who sent Nezuko to sleep and that he can train Tanjiro to become a demon slayer.",
                "downloads": [
                    { "quality": "480p x264", "size": "110.00 MB", "link": "#" },
                    { "quality": "720p x264", "size": "210.00 MB", "link": "#" },
                    { "quality": "720p HEVC 10bit", "size": "160.00 MB", "link": "#" },
                    { "quality": "1080p HEVC 10bit", "size": "360.00 MB", "link": "#" }
                ]
            },
            "3": {
                "animeTitle": "Demon Slayer (Kimetsu no Yaiba)",
                "episodeName": "S01E03 — Sabito and Makomo",
                "poster": "https://cdn.phototourl.com/free/2026-06-25-24ba2203-1a9a-4fe4-bbb1-7b0cb92b42c4.jpg",
                "synopsis": "Tanjiro starts his training with Urokodaki. He meets two mysterious children named Sabito and Makomo, who help him train to become a strong demon slayer.",
                "downloads": [
                    { "quality": "480p x264", "size": "112.00 MB", "link": "#" },
                    { "quality": "720p x264", "size": "215.00 MB", "link": "#" },
                    { "quality": "1080p HEVC 10bit", "size": "370.00 MB", "link": "#" }
                ]
            }
        };

        // --- LOAD EPISODE FUNCTION ---
        function loadEpisode() {
            const urlParams = new URLSearchParams(window.location.search);
            const epId = urlParams.get('ep'); // URL se ?ep=1 read karega
            
            const container = document.getElementById('downloadContainer');

            if (epId && episodesData[epId]) {
                const data = episodesData[epId];
                
                // Generate download buttons HTML
                let downloadHtml = '';
                data.downloads.forEach(item => {
                    downloadHtml += `
                        <a href="${item.link}" target="_blank" class="download-item" style="text-decoration: none; display: block;">
                            <i class="fas fa-file-alt"></i>
                            <span class="size">${item.size}</span>
                            <span class="quality">${item.quality}</span>
                        </a>
                    `;
                });

                // Render HTML
                container.innerHTML = `
                    <div class="download-card">
                        <div class="card-header">
                            <i class="fas fa-play-circle"></i>
                            <h2>${data.animeTitle}</h2>
                        </div>
                        <div class="episode-info">
                            <img src="${data.poster}" alt="Poster" class="episode-poster">
                            <div class="episode-text">
                                <h3>${data.episodeName}</h3>
                                <h4>Demon Slayer</h4>
                                <p>${data.synopsis}</p>
                            </div>
                        </div>
                        <div class="download-grid">
                            ${downloadHtml}
                        </div>
                    </div>
                `;
            } else {
                // Agar ID galat hai ya data nahi mila
                container.innerHTML = `
                    <div style="text-align: center; padding: 50px; background: #1e1e1e; border-radius: 12px; border: 1px solid #333;">
                        <i class="fas fa-exclamation-circle" style="font-size: 40px; color: #ff5555; margin-bottom: 15px; display: block;"></i>
                        <h2 style="color: #fff;">Episode Not Found</h2>
                        <p style="color: #888; margin-top: 10px;">The episode ID you requested does not exist.</p>
                        <a href="anime.html" style="display: inline-block; margin-top: 20px; padding: 10px 25px; background: #ffcc00; color: #000; border-radius: 30px; font-weight: bold;">Go to Anime</a>
                    </div>
                `;
            }
        }

        // --- TOGGLES ---
        function toggleSearchBar() {
            const box = document.getElementById('searchBox');
            box.classList.toggle('active');
            if (box.classList.contains('active')) {
                document.getElementById('searchInput').focus();
            }
        }

        function toggleSidebar() { document.getElementById("mySidebar").classList.toggle("active"); }

        function toggleLightMode() {
            document.body.classList.toggle("light-mode");
            const icon = document.querySelector(".theme-toggle i");
            if (document.body.classList.contains("light-mode")) {
                icon.classList.remove("fa-moon"); icon.classList.add("fa-sun");
            } else {
                icon.classList.remove("fa-sun"); icon.classList.add("fa-moon");
            }
        }

        // --- PAGE LOAD ---
        document.addEventListener('DOMContentLoaded', function() {
            loadEpisode();
        });
    </script>
</body>
</html>
