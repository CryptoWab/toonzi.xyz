<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOONZI - toonzi.xyz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- RESET & BASICS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8f9fa;
            color: #333;
            transition: background-color 0.3s, color 0.3s;
            padding-bottom: 100px; 
        }
        a { text-decoration: none; color: inherit; }

        /* --- HEADER --- */
        header {
            background: linear-gradient(90deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .menu-icon { font-size: 24px; cursor: pointer; transition: 0.3s; width: 30px; }
        .menu-icon:hover { color: #ffcc00; }
        .site-title {
            font-family: 'Impact', sans-serif;
            font-size: 26px;
            letter-spacing: 2px;
            color: #fff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        .site-title span { color: #ffcc00; }
        .search-icon { font-size: 20px; cursor: pointer; transition: 0.3s; width: 30px; text-align: right; }
        .search-icon:hover { color: #ffcc00; }

        /* --- SEARCH BAR (SLIDE DOWN) --- */
        .search-slide {
            position: sticky;
            top: 70px; /* Header ke neeche */
            width: 100%;
            background: #fff;
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 998;
            display: none; /* Default hidden */
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #ddd;
        }
        .search-slide.active {
            display: flex;
        }
        .search-slide input {
            flex: 1;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }
        .search-slide input:focus {
            border-color: #302b63;
        }
        .search-slide .close-search-btn {
            font-size: 24px;
            color: #555;
            cursor: pointer;
            padding: 5px 10px;
            transition: 0.3s;
        }
        .search-slide .close-search-btn:hover { color: #ff0000; }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #1a1a2e; color: #fff; transition: 0.4s ease-in-out;
            padding-top: 60px; z-index: 2000; box-shadow: 2px 0 10px rgba(0,0,0,0.5); overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar a {
            padding: 15px 25px; text-decoration: none; font-size: 16px; color: #ccc;
            display: block; transition: 0.3s; border-left: 4px solid transparent;
        }
        .sidebar a:hover { color: #fff; background-color: #252547; border-left: 4px solid #ffcc00; }
        .sidebar .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #ffcc00; }

        /* --- GRID --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; padding-bottom: 20px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .anime-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.3s ease; cursor: pointer; position: relative; }
        .anime-card:hover { transform: translateY(-8px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .poster-container { width: 100%; height: 250px; background-color: #eee; position: relative; }
        .poster-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .anime-info { padding: 12px 15px; text-align: center; }
        .anime-info h3 { font-size: 15px; font-weight: 600; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- NO DATA --- */
        .no-data-message { grid-column: 1 / -1; text-align: center; padding: 60px 20px; background: #fff; border-radius: 15px; border: 2px dashed #ccc; color: #666; font-size: 18px; font-weight: 500; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .no-data-message i { font-size: 40px; color: #999; display: block; margin-bottom: 15px; }

        /* --- FOOTER --- */
        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f0c29; color: #ccc; text-align: center; padding: 15px 10px; border-top: 3px solid #ffcc00; z-index: 999; font-size: 13px; line-height: 1.6; }
        footer a { color: #ffcc00; font-weight: bold; }
        .footer-social { margin-top: 8px; display: flex; justify-content: center; gap: 20px; }
        .footer-social a { color: #ccc; font-size: 20px; transition: 0.3s; }
        .footer-social a:hover { color: #ffcc00; transform: scale(1.1); }

        /* --- THEME TOGGLE --- */
        .theme-toggle { position: fixed; bottom: 90px; right: 20px; background: #302b63; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 1000; transition: 0.3s; }
        .theme-toggle:hover { transform: scale(1.1); background: #ffcc00; color: #333; }

        /* --- DARK MODE --- */
        body.dark-mode { background-color: #121212; color: #e0e0e0; }
        body.dark-mode header { background: #1e1e1e; }
        body.dark-mode .sidebar { background: #1e1e1e; }
        body.dark-mode .anime-card { background: #1e1e1e; border: 1px solid #333; }
        body.dark-mode .anime-info h3 { color: #fff; }
        body.dark-mode .theme-toggle { background: #333; color: #ffcc00; }
        body.dark-mode footer { background: #1e1e1e; border-top: 3px solid #555; }
        body.dark-mode .poster-container { background-color: #2a2a2a; }
        body.dark-mode .no-data-message { background: #1e1e1e; border-color: #444; color: #aaa; }
        body.dark-mode .no-data-message i { color: #666; }
        body.dark-mode .footer-social a { color: #aaa; }
        body.dark-mode .search-slide { background: #1e1e1e; border-bottom: 1px solid #444; }
        body.dark-mode .search-slide input { background: #2a2a2a; color: #fff; border-color: #444; }
        body.dark-mode .search-slide .close-search-btn { color: #aaa; }
        body.dark-mode .search-slide .close-search-btn:hover { color: #ff5555; }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <div class="site-title">TOON<span>ZI</span></div>
        <div class="search-icon" onclick="toggleSearch()"><i class="fas fa-search"></i></div>
    </header>

    <!-- SLIDE SEARCH BAR -->
    <div id="searchSlide" class="search-slide">
        <input type="text" id="searchInput" placeholder="Type here to search..." onkeyup="handleSearch()">
        <span class="close-search-btn" onclick="toggleSearch()">&times;</span>
    </div>

    <!-- SIDEBAR -->
    <div id="mySidebar" class="sidebar">
        <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="anime.html"><i class="fas fa-tv"></i> Anime</a>
        <a href="movies.html"><i class="fas fa-film"></i> Movies</a>
        <a href="web-series.html"><i class="fas fa-video"></i> Web Series</a>
        <div style="border-top: 1px solid #333; margin: 10px 20px;"></div>
        <a href="terms-and-condition.html"><i class="fas fa-file-contract"></i> Terms and Condition</a>
        <a href="privacy-policy.html"><i class="fas fa-shield-alt"></i> Privacy Policy</a>
        <a href="contact.html"><i class="fas fa-envelope"></i> Contact Us</a>
        <a href="dmca.html"><i class="fas fa-copyright"></i> DMCA</a>
    </div>

    <main>
        <div class="container">
            <div class="anime-grid" id="animeGridContainer">
                <!-- Loading Message initially -->
                <div class="no-data-message" id="loadingMsg">
                    <i class="fas fa-spinner fa-spin"></i>
                    Loading Data...
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Copyright © 2012-2025. All Rights Reserved by <a href="https://toonzi.xyz">TOONZI</a>.</p>
        <div class="footer-social">
            <a href="#" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>

    <div class="theme-toggle" onclick="toggleDarkMode()">
        <i class="fas fa-moon"></i>
    </div>

    <script>
        // Global variable to store JSON data
        let animeData = [];

        // --- 1. FETCH DATA FROM data.json ---
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Data file not found');
                animeData = await response.json();
                renderAnimeGrid(animeData);
            } catch (error) {
                console.error('Error loading JSON:', error);
                const gridContainer = document.getElementById('animeGridContainer');
                gridContainer.innerHTML = `
                    <div class="no-data-message">
                        <i class="fas fa-folder-open"></i>
                        No Post Found
                    </div>
                `;
            }
        }

        // --- 2. GRID LOAD ---
        function renderAnimeGrid(data) {
            const gridContainer = document.getElementById('animeGridContainer');
            gridContainer.innerHTML = ''; 
            if (!data || data.length === 0) {
                gridContainer.innerHTML = `<div class="no-data-message"><i class="fas fa-folder-open"></i> No Post Found</div>`;
                return;
            }
            data.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                card.onclick = function() { window.location.href = anime.link; };
                card.innerHTML = `
                    <div class="poster-container"><img src="${anime.poster}" alt="${anime.title}" loading="lazy"></div>
                    <div class="anime-info"><h3>${anime.title}</h3></div>
                `;
                gridContainer.appendChild(card);
            });
        }

        // --- 3. SEARCH FUNCTION ---
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (query === "") { 
                renderAnimeGrid(animeData); 
                return; 
            }
            const filteredData = animeData.filter(anime => 
                anime.searchTag.toLowerCase().includes(query)
            );
            renderAnimeGrid(filteredData);
        }

        // --- 4. TOGGLE FUNCTIONS ---
        function toggleSidebar() { document.getElementById("mySidebar").classList.toggle("active"); }

        function toggleSearch() {
            const slide = document.getElementById("searchSlide");
            slide.classList.toggle("active");
            if (slide.classList.contains("active")) {
                document.getElementById("searchInput").focus();
            } else {
                document.getElementById("searchInput").value = ""; 
                handleSearch(); // Reset grid
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
            const icon = document.querySelector(".theme-toggle i");
            if (document.body.classList.contains("dark-mode")) {
                icon.classList.remove("fa-moon"); icon.classList.add("fa-sun");
            } else {
                icon.classList.remove("fa-sun"); icon.classList.add("fa-moon");
            }
        }

        // --- 5. PAGE LOAD (Start Fetch) ---
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });
    </script>
</body>
</html>
